name: portside-time

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - /etc/portside/time.env
    environment:
      DATABASE_URL: "file:/data/portside.db"
      NODE_ENV: production
    volumes:
      - /srv/portside/data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - portside

  caddy:
    image: caddy:2-alpine
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /srv/portside/caddy:/data
      - /srv/portside/caddy-config:/config
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    restart: unless-stopped
    networks:
      - portside

networks:
  portside:
    driver: bridge
