name: portside-time

services:
  app:
    image: ghcr.io/bashir-netizen/portside-time:latest
    env_file:
      - /etc/portside/time.env
    environment:
      DATABASE_URL: "file:/data/portside.db"
      NODE_ENV: production
    volumes:
      - /srv/portside/data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - portside

  # Continuous SQLite replication to Cloudflare R2.
  # Replaces the previous cron-style backup container. See litestream.yml
  # at the repo root for replication config.
  litestream:
    image: litestream/litestream:0.3
    env_file:
      - /etc/portside/time.env
    volumes:
      - /srv/portside/data:/data
      - ./litestream.yml:/etc/litestream.yml:ro
    command: ["replicate"]
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - portside

  # Internal HTTP router. Plain HTTP on :8080, bound to the host's loopback
  # so only cloudflared (running on the host as a systemd service) can reach
  # it. TLS terminates at Cloudflare's edge.
  caddy:
    image: caddy:2-alpine
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    restart: unless-stopped
    networks:
      - portside

networks:
  portside:
    driver: bridge
